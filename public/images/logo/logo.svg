<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#059669" opacity="0.1" stroke="#059669" stroke-width="2"/>
  
  <!-- Hammer Icon -->
  <g transform="translate(60, 70)">
    <!-- Hammer Head -->
    <rect x="10" y="0" width="30" height="20" rx="3" fill="#059669"/>
    <!-- Hammer Handle -->
    <rect x="22" y="18" width="6" height="50" rx="3" fill="#059669"/>
  </g>
  
  <!-- Paint Brush Icon -->
  <g transform="translate(90, 70)">
    <!-- Brush Head -->
    <ellipse cx="15" cy="8" rx="8" ry="10" fill="#059669"/>
    <!-- Brush Handle -->
    <rect x="12" y="16" width="6" height="50" rx="3" fill="#059669"/>
  </g>
  
  <!-- Company Name -->
  <text x="100" y="155" font-family="Montserrat, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#059669">
    DW
  </text>
  <text x="100" y="175" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#059669" opacity="0.8">
    COMPANY
  </text>
</svg>
